    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Overrides: semi-transparent nav, fixed background video under nav, remove neon glow, remove hero title -->
    <style>
      :root { --nav-height: 72px; }

      /* Keep nav semi-transparent so video shows through but hides glow behind it */
      nav { height: var(--nav-height); }

      /* #home sits below the nav and ensures content layers above the fixed video */
      #home {
        padding-top: var(--nav-height);
        min-height: calc(100vh - var(--nav-height));
        position: relative;
        z-index: 10; /* ensure site content sits above the background video */
        overflow: hidden;
      }

      /* Make background video fixed, full-width and full-height (below the nav) */
      #bgVideo {
        position: fixed;
        top: var(--nav-height);
        left: 0;
        width: 100vw;
        height: calc(100vh - var(--nav-height));
        object-fit: cover;
        transform: none !important;
        z-index: 0;
        opacity: 0.95; /* semi-transparent video so site layers show through subtly */
        pointer-events: none; /* allow clicks through to UI */
      }

      /* Gradient overlay should be above the video but below primary content */
      .video-gradient-overlay { z-index: 5; pointer-events: none; }

      /* Remove neon glow and purple color for any hero title if present */
      .neon-text {
        text-shadow: none !important;
        filter: none !important;
        color: #ffffff !important;
      }

      /* Ensure other sections sit above the fixed video */
      section { position: relative; z-index: 10; }

      /* Keep the side menu above everything */
      #sideMenu { z-index: 60; }

    </style>

</head>
